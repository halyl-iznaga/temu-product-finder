name: Run Temu Finder

on:
  schedule:
    - cron: "0 13 * * *"

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python temu_finder.py
